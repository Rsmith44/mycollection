<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>myCollection</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="myCollection" />
<link rel="apple-touch-icon" href="icon-192.png" />

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Lato', sans-serif; background: #f7f5f0; min-height: 100vh;
  /* Safe area insets for iPhone notch/home bar */
  padding-bottom: env(safe-area-inset-bottom);
}
#header {
  background: #1a1a1a; padding: 0 24px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  padding-top: env(safe-area-inset-top);
}
#header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 60px; }
#logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.3rem; color: #fff; margin-right: 16px; }
#logo em { color: #d4a853; font-style: normal; }
.nav-btn { padding: 6px 16px; border-radius: 8px; border: none; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; font-family: 'Lato', sans-serif; background: transparent; color: #888; }
.nav-btn:hover { color: #fff; }
.nav-btn.active { background: #d4a853; color: #1a1a1a; }
#main { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }
.page-title { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(1.8rem, 4vw, 2.6rem); color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
.page-sub { color: #888; font-size: 0.95rem; margin-bottom: 28px; }
.search-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.search-row input { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 12px; border: 2px solid #e0ddd6; background: #fff; font-size: 1rem; font-family: 'Lato', sans-serif; color: #1a1a1a; outline: none; }
.search-row input:focus { border-color: #d4a853; }
.search-row select { padding: 12px 14px; border-radius: 12px; border: 2px solid #e0ddd6; background: #fff; font-size: 0.9rem; font-family: 'Lato', sans-serif; color: #444; cursor: pointer; outline: none; }
#search-btn { padding: 12px 28px; border-radius: 12px; border: none; background: #1a1a1a; color: #fff; font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: 'Lato', sans-serif; transition: background 0.15s; }
#search-btn:hover { background: #333; }
#search-btn:disabled { background: #bbb; cursor: default; }
#status { font-size: 0.85rem; margin-bottom: 16px; color: #888; min-height: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 20px; }
.card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); transition: box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column; }
.card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.14); transform: translateY(-4px); }
.card-art { position: relative; padding-top: 140%; background: #eee; flex-shrink: 0; overflow: hidden; }
.card-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.card-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 44px; }
.badge { position: absolute; top: 8px; left: 8px; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; }
.badge-movie { background: #e8f4f8; color: #2a7fba; }
.badge-tv    { background: #f4f0f8; color: #7a3fbf; }
.badge-album { background: #f8f4e8; color: #c47d1a; }
.card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; flex: 1; gap: 3px; }
.card-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.92rem; line-height: 1.3; color: #1a1a1a; }
.card-sub   { font-size: 0.78rem; color: #888; }
.card-year  { font-size: 0.73rem; color: #aaa; }
.card-extra { font-size: 0.7rem; color: #bbb; font-style: italic; }
.card-btn-wrap { margin-top: auto; padding-top: 10px; }
.card-btn-wrap button { width: 100%; padding: 7px 0; border-radius: 8px; font-weight: 700; font-size: 0.76rem; cursor: pointer; transition: all 0.15s; font-family: 'Lato', sans-serif; }
.btn-save   { border: none; background: #1a1a1a; color: #fff; }
.btn-save:hover { background: #333; }
.btn-remove { border: 1.5px solid #ddd; background: #fafafa; color: #999; }
.btn-remove:hover { background: #fff0f0; color: #e00; border-color: #e00; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.tab { padding: 8px 18px; border-radius: 99px; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; font-family: 'Lato', sans-serif; border: 1.5px solid #ddd; background: #fff; color: #555; }
.tab:hover { border-color: #aaa; }
.tab.active { border-color: transparent; background: #1a1a1a; color: #fff; }
.empty { text-align: center; padding: 80px 0; color: #bbb; border-top: 1px solid #ede9e0; margin-top: 8px; }
.empty-icon  { font-size: 52px; margin-bottom: 14px; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 18px; }
.empty-btn { padding: 10px 24px; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; font-weight: 700; cursor: pointer; font-size: 0.85rem; font-family: 'Lato', sans-serif; }
.empty-btn:hover { background: #333; }
#toast { position: fixed; bottom: calc(28px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(16px); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 0.88rem; font-weight: 700; box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 999; font-family: 'Lato', sans-serif; white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Mobile tweaks */
@media (max-width: 500px) {
  #main { padding: 24px 16px; }
  .search-row { gap: 8px; }
  .search-row input { font-size: 16px; } /* prevents iOS zoom on focus */
  .search-row select { font-size: 16px; }
  #search-btn { padding: 12px 20px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
}
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="logo"><em>my</em>collection</div>
    <button class="nav-btn active" id="btn-search" onclick="showSearch()">Search</button>
    <button class="nav-btn" id="btn-collection" onclick="showCollection()">Collection (0)</button>
  </div>
</div>

<div id="main">
  <div id="view-search">
    <h1 class="page-title">Find something<br>worth keeping.</h1>
    <p class="page-sub">Search movies, TV shows, and albums — then save them to your collection.</p>
    <div class="search-row">
      <input id="q" type="text" placeholder="e.g. Pink Floyd, Sopranos, Dune…" onkeydown="if(event.key==='Enter')doSearch()" />
      <select id="media-type">
        <option value="all">All Types</option>
        <option value="movie">Movies</option>
        <option value="tv">TV Shows</option>
        <option value="album">Albums</option>
      </select>
      <button id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="status"></div>
    <div id="search-results" class="grid"></div>
    <div id="search-empty" class="empty">
      <div class="empty-icon">🎬 📺 🎵</div>
      <div class="empty-title">Your next favourite is out there</div>
    </div>
  </div>

  <div id="view-collection" style="display:none">
    <h1 class="page-title" style="margin-bottom:20px">My Collection</h1>
    <div class="tabs">
      <button class="tab active" id="tab-all"   onclick="setTab('all')">All (0)</button>
      <button class="tab"        id="tab-movie" onclick="setTab('movie')">Movies (0)</button>
      <button class="tab"        id="tab-tv"    onclick="setTab('tv')">TV Shows (0)</button>
      <button class="tab"        id="tab-album" onclick="setTab('album')">Albums (0)</button>
    </div>
    <div id="col-results" class="grid"></div>
    <div id="col-empty" class="empty" style="display:none">
      <div class="empty-icon">✨</div>
      <div class="empty-title">Nothing here yet</div>
      <button class="empty-btn" onclick="showSearch()">Search &amp; add something</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
var OMDB_KEY  = '4287ad07';
var collection  = [];
var itemCache   = {};
var currentTab  = 'all';
var lastResults = [];
try { collection = JSON.parse(localStorage.getItem('mc6') || '[]'); } catch(e) { collection = []; }
collection.forEach(function(x){ itemCache[x.id] = x; });

function persist() { try { localStorage.setItem('mc6', JSON.stringify(collection)); } catch(e){} }
function isSaved(id) { for(var i=0;i<collection.length;i++){if(collection[i].id===id)return true;} return false; }
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function jsonpFetch(url) {
  return new Promise(function(resolve, reject) {
    var id = 'jcb' + Date.now() + Math.floor(Math.random()*99999);
    var script = document.createElement('script');
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return; settled=true; delete window[id];
      if(script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('timeout'));
    }, 12000);
    window[id] = function(data) {
      if(settled) return; settled=true; clearTimeout(timer); delete window[id];
      if(script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    script.onerror = function() {
      if(settled) return; settled=true; clearTimeout(timer); delete window[id];
      if(script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('load error'));
    };
    script.src = url + '&callback=' + id;
    document.head.appendChild(script);
  });
}

function bigArt(url) {
  if (!url) return '';
  return url.replace(/\d+x\d+bb/, '400x400bb');
}

function sortResults(items, q) {
  var ql = q.toLowerCase();
  return items.slice().sort(function(a, b) {
    var al = a.title.toLowerCase(), bl = b.title.toLowerCase();
    var aExact = al === ql ? 2 : al.indexOf(ql) === 0 ? 1 : 0;
    var bExact = bl === ql ? 2 : bl.indexOf(ql) === 0 ? 1 : 0;
    if (bExact !== aExact) return bExact - aExact;
    return (b._score || 0) - (a._score || 0);
  });
}

function fetchAlbums(q) {
  var url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(q)
          + '&media=music&entity=song&limit=200&country=us';
  return jsonpFetch(url).then(function(data) {
    var seen = {}, freq = {}, albums = [];
    var results = data.results || [];
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      if (!r.collectionId) continue;
      freq[r.collectionId] = (freq[r.collectionId] || 0) + 1;
      if (seen[r.collectionId]) continue;
      seen[r.collectionId] = true;
      albums.push({
        id:       'al-' + r.collectionId,
        title:    r.collectionName || '',
        subtitle: r.artistName || '',
        year:     r.releaseDate ? r.releaseDate.slice(0,4) : '',
        type:     'album',
        image:    bigArt(r.artworkUrl100),
        extra:    r.primaryGenreName || '',
        _score:   0
      });
    }
    for (var j = 0; j < albums.length; j++) {
      albums[j]._score = freq[albums[j].id.replace('al-','')] || 0;
    }
    return sortResults(albums, q);
  }).catch(function(e){ console.warn('albums:', e); return []; });
}

function fetchMovies(q) {
  var url = 'https://www.omdbapi.com/?s=' + encodeURIComponent(q) + '&type=movie&apikey=' + OMDB_KEY;
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.Response !== 'True') return [];
      return sortResults(data.Search.map(function(x, i) {
        return {
          id: 'mv-'+x.imdbID, title: x.Title||'', subtitle: '', year: x.Year||'',
          type: 'movie', image: (x.Poster&&x.Poster!=='N/A')?x.Poster:'', extra: '',
          _score: (data.Search.length - i)
        };
      }), q);
    }).catch(function(e){ console.warn('movies:', e); return []; });
}

function fetchTV(q) {
  return fetch('https://api.tvmaze.com/search/shows?q=' + encodeURIComponent(q))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var out = [];
      for (var i = 0; i < Math.min(data.length, 12); i++) {
        var s = data[i].show;
        out.push({
          id: 'tv-'+s.id, title: s.name||'',
          subtitle: (s.network&&s.network.name)||(s.webChannel&&s.webChannel.name)||'TV Series',
          year: s.premiered?s.premiered.slice(0,4):'', type: 'tv',
          image: (s.image&&(s.image.original||s.image.medium))||'',
          extra: (s.genres||[]).slice(0,2).join(', '),
          _score: data[i].score||0
        });
      }
      return sortResults(out, q);
    }).catch(function(e){ console.warn('tv:', e); return []; });
}

function doSearch() {
  var q    = (document.getElementById('q').value || '').trim();
  var type = document.getElementById('media-type').value;
  if (!q) return;
  var btn = document.getElementById('search-btn');
  btn.disabled = true; btn.textContent = 'Searching\u2026';
  setStatus('Searching\u2026');
  document.getElementById('search-empty').style.display = 'none';
  document.getElementById('search-results').innerHTML = '';
  var promises = [];
  if (type==='all'||type==='movie') promises.push(fetchMovies(q));
  if (type==='all'||type==='tv')    promises.push(fetchTV(q));
  if (type==='all'||type==='album') promises.push(fetchAlbums(q));
  Promise.all(promises).then(function(arrays) {
    btn.disabled = false; btn.textContent = 'Search';
    var results = [];
    for (var i=0;i<arrays.length;i++) for (var j=0;j<arrays[i].length;j++) results.push(arrays[i][j]);
    lastResults = results;
    for (var k=0;k<results.length;k++) itemCache[results[k].id] = results[k];
    if (results.length === 0) {
      setStatus('');
      document.getElementById('search-empty').style.display = '';
      document.getElementById('search-empty').querySelector('.empty-title').textContent = 'No results found \u2014 try another search';
      return;
    }
    setStatus(results.length+' result'+(results.length!==1?'s':'')+' for \u201c'+q+'\u201d');
    renderGrid('search-results', results);
  }).catch(function(err){
    btn.disabled=false; btn.textContent='Search';
    setStatus('Something went wrong \u2014 check your internet connection.');
    console.error(err);
  });
}

function cardHtml(item) {
  var bc = item.type==='movie'?'badge-movie':item.type==='tv'?'badge-tv':'badge-album';
  var lb = item.type==='movie'?'Movie':item.type==='tv'?'TV Show':'Album';
  var ic = item.type==='movie'?'🎬':item.type==='tv'?'📺':'🎵';
  var saved = isSaved(item.id);
  var img = item.image?'<img src="'+esc(item.image)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'';
  var btn = saved
    ? '<button class="btn-remove" onclick="removeItem(\''+esc(item.id)+'\')">&#10003; Saved &mdash; Remove</button>'
    : '<button class="btn-save"   onclick="saveItem(\''+esc(item.id)+'\')">+ Save to Collection</button>';
  return '<div class="card">'
    +'<div class="card-art">'+img+'<div class="card-placeholder">'+ic+'</div><span class="badge '+bc+'">'+lb+'</span></div>'
    +'<div class="card-body">'
    +'<div class="card-title">'+esc(item.title)+'</div>'
    +'<div class="card-sub">'+esc(item.subtitle)+'</div>'
    +(item.year?'<div class="card-year">'+esc(item.year)+'</div>':'')
    +(item.extra?'<div class="card-extra">'+esc(item.extra)+'</div>':'')
    +'<div class="card-btn-wrap">'+btn+'</div>'
    +'</div></div>';
}

function renderGrid(id, items) {
  var h=''; for(var i=0;i<items.length;i++) h+=cardHtml(items[i]);
  document.getElementById(id).innerHTML = h;
}

function saveItem(id) {
  var item=itemCache[id]; if(!item||isSaved(id)) return;
  collection.unshift(item); persist(); updateNavBtn();
  renderGrid('search-results', lastResults);
  showToast('Saved \u201c'+item.title+'\u201d');
}
function removeItem(id) {
  var item=itemCache[id];
  var next=[];
  for(var i=0;i<collection.length;i++) if(collection[i].id!==id) next.push(collection[i]);
  collection=next; persist(); updateNavBtn();
  renderGrid('search-results', lastResults);
  if(document.getElementById('view-collection').style.display!=='none') renderCollection();
  showToast(item?'Removed \u201c'+item.title+'\u201d':'Removed');
}

function showSearch() {
  document.getElementById('view-search').style.display='';
  document.getElementById('view-collection').style.display='none';
  document.getElementById('btn-search').classList.add('active');
  document.getElementById('btn-collection').classList.remove('active');
}
function showCollection() {
  document.getElementById('view-search').style.display='none';
  document.getElementById('view-collection').style.display='';
  document.getElementById('btn-search').classList.remove('active');
  document.getElementById('btn-collection').classList.add('active');
  renderCollection();
}
function updateNavBtn() {
  document.getElementById('btn-collection').textContent='Collection ('+collection.length+')';
}

function setTab(tab) {
  currentTab=tab;
  ['all','movie','tv','album'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  renderCollection();
}

function renderCollection() {
  var items=[];
  for(var i=0;i<collection.length;i++){
    if(currentTab==='all'||collection[i].type===currentTab) items.push(collection[i]);
  }
  var grid=document.getElementById('col-results'), empty=document.getElementById('col-empty');
  if(items.length===0){
    grid.innerHTML=''; empty.style.display='';
    var icons={all:'✨',movie:'🎬',tv:'📺',album:'🎵'};
    var labels={all:'Your collection is empty',movie:'No movies saved yet',tv:'No TV shows saved yet',album:'No albums saved yet'};
    empty.querySelector('.empty-icon').textContent=icons[currentTab]||'✨';
    empty.querySelector('.empty-title').textContent=labels[currentTab]||'Nothing here yet';
  } else {
    empty.style.display='none'; renderGrid('col-results',items);
  }
  var counts={all:collection.length,movie:0,tv:0,album:0};
  for(var j=0;j<collection.length;j++){var t=collection[j].type; if(counts[t]!==undefined)counts[t]++;}
  document.getElementById('tab-all').textContent  ='All ('+counts.all+')';
  document.getElementById('tab-movie').textContent='Movies ('+counts.movie+')';
  document.getElementById('tab-tv').textContent   ='TV Shows ('+counts.tv+')';
  document.getElementById('tab-album').textContent='Albums ('+counts.album+')';
  ['all','movie','tv','album'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===currentTab);
  });
}

updateNavBtn();

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(e) {
      console.log('SW registration failed:', e);
    });
  });
}
</script>
</body>
</html>
